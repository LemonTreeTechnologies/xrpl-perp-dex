# Perp DEX — api.xperp.fi (prod hostname).
# While mainnet is paused (escrow closed 2026-04-18), this vhost proxies to
# the testnet dev orchestrator on :3003. When mainnet is restored, change the
# upstream to :3000 — no other change needed, the frontend will see the new
# network/deposit_address via /v1/system/status.
#
# Deploy:
#   sudo cp api.xperp.fi.conf /etc/nginx/sites-available/api.xperp.fi
#   sudo ln -s /etc/nginx/sites-available/api.xperp.fi /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.xperp.fi

server {
    listen 80;
    server_name api.xperp.fi;

    # Frontend config discovery
    location = /v1/system/status { proxy_pass http://127.0.0.1:3003; }
    location = /v1/health         { proxy_pass http://127.0.0.1:3003; }
    location = /v1/openapi.json   { proxy_pass http://127.0.0.1:3003; }

    # Auth
    location = /v1/auth/login     { proxy_pass http://127.0.0.1:3003; }

    # Trading
    location = /v1/orders         { proxy_pass http://127.0.0.1:3003; }
    location ~ ^/v1/orders/       { proxy_pass http://127.0.0.1:3003; }
    location ~ ^/v1/positions/    { proxy_pass http://127.0.0.1:3003; }
    location ~ ^/v1/account/      { proxy_pass http://127.0.0.1:3003; }
    location = /v1/withdraw       { proxy_pass http://127.0.0.1:3003; }

    # Market data
    location = /v1/markets        { proxy_pass http://127.0.0.1:3003; }
    location ~ ^/v1/markets/      { proxy_pass http://127.0.0.1:3003; }

    # Attestation
    location ~ ^/v1/attestation/  { proxy_pass http://127.0.0.1:3003; }

    # WebSocket
    location = /ws {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Everything else: 403 (including /v1/perp/* internal endpoints)
    location / { return 403; }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
