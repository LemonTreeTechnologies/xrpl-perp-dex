# Perp DEX — api-dev.xperp.fi (testnet dev hostname).
# Proxies to the dev orchestrator on :3003 (XRPL testnet).
#
# Deploy:
#   sudo cp api-dev.xperp.fi.conf /etc/nginx/sites-available/api-dev.xperp.fi
#   sudo ln -s /etc/nginx/sites-available/api-dev.xperp.fi /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api-dev.xperp.fi

server {
    listen 80;
    server_name api-dev.xperp.fi;

    location = /v1/system/status { proxy_pass http://127.0.0.1:3003; }
    location = /v1/health         { proxy_pass http://127.0.0.1:3003; }
    location = /v1/openapi.json   { proxy_pass http://127.0.0.1:3003; }

    location = /v1/auth/login     { proxy_pass http://127.0.0.1:3003; }

    location = /v1/orders         { proxy_pass http://127.0.0.1:3003; }
    location ~ ^/v1/orders/       { proxy_pass http://127.0.0.1:3003; }
    location ~ ^/v1/positions/    { proxy_pass http://127.0.0.1:3003; }
    location ~ ^/v1/account/      { proxy_pass http://127.0.0.1:3003; }
    location = /v1/withdraw       { proxy_pass http://127.0.0.1:3003; }

    location = /v1/markets        { proxy_pass http://127.0.0.1:3003; }
    location ~ ^/v1/markets/      { proxy_pass http://127.0.0.1:3003; }

    location ~ ^/v1/attestation/  { proxy_pass http://127.0.0.1:3003; }

    location = /ws {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    location / { return 403; }

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
}
